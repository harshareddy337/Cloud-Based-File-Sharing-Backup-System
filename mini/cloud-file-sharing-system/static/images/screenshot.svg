<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-label="Dashboard mockup screenshot">
  <defs>
    <linearGradient id="bg" x1="0" x2="1">
      <stop offset="0" stop-color="#f7fbfe"/>
      <stop offset="1" stop-color="#eef6fb"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="18" flood-color="#000" flood-opacity="0.06"/>
    </filter>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)" rx="12"/>

  <!-- Header -->
  <rect x="40" y="30" width="1120" height="80" rx="8" fill="#fff" filter="url(#soft)"/>
  <text x="70" y="82" font-family="Inter,Segoe UI,Arial" font-size="28" fill="#2b6cb0" font-weight="700">Cloud Share</text>

  <!-- Left column (upload + files) -->
  <rect x="40" y="130" width="760" height="520" rx="10" fill="#fff" filter="url(#soft)" />
  <text x="64" y="170" font-family="Inter,Segoe UI,Arial" font-size="18" fill="#203647" font-weight="600">Upload a file</text>
  <rect x="64" y="185" width="640" height="48" rx="8" fill="#f4f8fb"/>
  <text x="74" y="215" font-family="Inter,Segoe UI,Arial" font-size="13" fill="#6c757d">Choose file...</text>
  <rect x="718" y="188" width="120" height="42" rx="8" fill="#3498db"/>
  <text x="746" y="216" font-family="Inter,Segoe UI,Arial" font-size="14" fill="#fff">Upload</text>

  <text x="64" y="260" font-family="Inter,Segoe UI,Arial" font-size="18" fill="#203647" font-weight="600">Your files</text>

  <!-- File rows -->
  <g transform="translate(64,280)">
    <rect width="680" height="72" rx="8" fill="#fbfdff"/>
    <rect y="86" width="680" height="72" rx="8" fill="#fbfdff"/>
    <rect y="172" width="680" height="72" rx="8" fill="#fbfdff"/>

    <!-- Row content -->
    <rect x="12" y="12" width="56" height="56" rx="6" fill="#eef6fb"/>
    <text x="80" y="44" font-family="Inter,Segoe UI,Arial" font-size="14" fill="#203647" font-weight="600">hello.txt</text>
    <text x="80" y="64" font-family="Inter,Segoe UI,Arial" font-size="12" fill="#6c757d">1.2 KB • text</text>

    <text x="620" y="44" font-family="Inter,Segoe UI,Arial" font-size="14" fill="#203647">Download</text>
  </g>

  <!-- Right column (account) -->
  <rect x="824" y="130" width="336" height="520" rx="10" fill="#fff" filter="url(#soft)" />
  <text x="850" y="170" font-family="Inter,Segoe UI,Arial" font-size="18" fill="#203647" font-weight="600">Account</text>
  <text x="850" y="200" font-family="Inter,Segoe UI,Arial" font-size="14" fill="#6c757d">Smoke Test • smoke_test@example.com</text>

  <!-- Footer bar -->
  <rect x="40" y="660" width="1120" height="24" rx="6" fill="#fff" opacity="0.06"/>

</svg>
