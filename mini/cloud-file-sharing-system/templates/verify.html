{% extends 'base.html' %}
{% block title %}Verify — My Cloud App{% endblock %}

{% block content %}
<style>
  .verify-wrap {
    min-height: calc(100vh - 65px);
    display: flex; align-items: center; justify-content: center;
    background: #f7f7fb;
    padding: 2rem 1rem;
  }
  .verify-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 20px;
    box-shadow: 0 8px 40px rgba(10,10,15,0.08);
    padding: 3rem 2.5rem;
    width: 100%;
    max-width: 440px;
    text-align: center;
  }
  .otp-icon {
    width: 72px; height: 72px;
    background: var(--sky);
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1.5rem;
    font-size: 2rem;
    color: var(--azure);
  }
  .otp-input {
    width: 100%;
    background: #f7f7fb;
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 1.1rem;
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    text-align: center;
    letter-spacing: 0.5em;
    color: var(--ink);
    outline: none;
    transition: all 0.2s;
  }
  .otp-input:focus { border-color: var(--azure); background: white; box-shadow: 0 0 0 4px rgba(37,99,235,0.1); }

  .verify-btn {
    width: 100%;
    background: var(--azure);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 0.9rem;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 1rem;
  }
  .verify-btn:hover { background: var(--azure2); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(37,99,235,0.3); }
  .verify-btn:disabled { background: #c7d7f5; transform: none; box-shadow: none; cursor: not-allowed; }

  .resend-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 1.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
  }

  .resend-btn {
    background: none; border: none;
    color: var(--azure); font-weight: 600; font-size: 0.875rem;
    cursor: pointer; padding: 0;
    transition: opacity 0.2s;
  }
  .resend-btn:disabled { color: #bbb; cursor: not-allowed; }

  .email-badge {
    display: inline-flex; align-items: center; gap: 0.4rem;
    background: var(--sky);
    border: 1px solid #bfdbfe;
    border-radius: 99px;
    padding: 0.35rem 0.9rem;
    font-size: 0.85rem;
    color: var(--azure);
    font-weight: 600;
    margin-bottom: 1.5rem;
  }
</style>

<div class="verify-wrap">
  <div class="verify-card fade-up">
    <div class="otp-icon">
      <i class="bi bi-envelope-check"></i>
    </div>

    <h2 style="font-family:'Syne',sans-serif;font-weight:800;font-size:1.6rem;letter-spacing:-0.03em;margin-bottom:0.5rem;">
      Check your inbox
    </h2>
    <p style="color:#888899;font-size:0.9rem;margin-bottom:1rem;">
      We sent a 6-digit code to
    </p>

    <div class="email-badge">
      <i class="bi bi-envelope-fill"></i>
      {{ masked_email }}
    </div>

    <form method="post" id="verify-form">
      <input
        type="text"
        name="otp"
        class="otp-input"
        maxlength="6"
        placeholder="000000"
        required
        autofocus
        autocomplete="one-time-code"
        inputmode="numeric"
        pattern="[0-9]{6}"
        id="otp-field"
      >
      <button type="submit" class="verify-btn" id="verify-btn">
        Verify & Sign In
      </button>
    </form>

    <div class="resend-row">
      <span style="font-size:0.85rem;color:#888899;" id="timer-label">
        Resend in <strong id="secs">{{ cooldown_seconds }}</strong>s
      </span>
      <button class="resend-btn" id="resend-btn" disabled>Resend Code</button>
    </div>

    <p style="font-size:0.75rem;color:#bbb;margin-top:0.75rem;" id="status-msg"></p>
  </div>
</div>

<script>
// Auto-format OTP input — allow only digits
const otpField = document.getElementById('otp-field');
otpField.addEventListener('input', function() {
  this.value = this.value.replace(/\D/g, '').slice(0, 6);
});

// Auto-submit when 6 digits typed
otpField.addEventListener('input', function() {
  if (this.value.length === 6) {
    document.getElementById('verify-btn').innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Verifying...';
    document.getElementById('verify-form').submit();
  }
});

// Countdown timer
let secs = parseInt('{{ cooldown_seconds|default(30) }}');
const secsEl = document.getElementById('secs');
const resendBtn = document.getElementById('resend-btn');
const timerLabel = document.getElementById('timer-label');

const iv = setInterval(() => {
  secs--;
  if (secsEl) secsEl.textContent = secs;
  if (secs <= 0) {
    clearInterval(iv);
    timerLabel.textContent = "Didn't receive the code?";
    resendBtn.disabled = false;
  }
}, 1000);

// Resend
resendBtn.addEventListener('click', async () => {
  const msg = document.getElementById('status-msg');
  msg.textContent = 'Sending...';
  resendBtn.disabled = true;
  try {
    const r = await fetch('/resend_otp', { method: 'POST' });
    const t = await r.text();
    msg.textContent = r.ok ? '✓ New code sent!' : t;
    if (r.ok) {
      secs = 30;
      timerLabel.innerHTML = 'Resend in <strong id="secs">30</strong>s';
      const newIv = setInterval(() => {
        secs--;
        const el = document.getElementById('secs');
        if (el) el.textContent = secs;
        if (secs <= 0) {
          clearInterval(newIv);
          timerLabel.textContent = "Didn't receive the code?";
          resendBtn.disabled = false;
        }
      }, 1000);
    }
  } catch(e) {
    msg.textContent = 'Connection error. Please try again.';
    resendBtn.disabled = false;
  }
});
</script>
{% endblock %}
